services:
  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 240203
      POSTGRES_DB: university_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - lakehouse-network

  # Kafka
  kafka:
    image: apache/kafka:4.1.1
    container_name: demo-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "9094:9094"
    networks:
      - lakehouse-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: demo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-network

  # Khởi tạo bucket
  minio-init:
    image: minio/mc:latest
    container_name: demo-minio-init
    depends_on:
      - minio
    networks:
      - lakehouse-network
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin); do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      if ! /usr/bin/mc ls myminio/university-lakehouse > /dev/null 2>&1; then
        /usr/bin/mc mb myminio/university-lakehouse;
        echo 'Bucket initialized';
      else
        echo 'Bucket already exists';
      fi;
      exit 0;
      "

  # Trino
  trino:
    image: trinodb/trino:435
    container_name: demo-trino
    ports:
      - "8081:8080"
    volumes:
      - ./lakehouse/trino/catalog:/etc/trino/catalog
    depends_on:
      - minio
    networks:
      - lakehouse-network


# Thêm Project Nessie (Iceberg Catalog)
# Thêm Project Nessie (Iceberg Catalog)
  nessie:
    image: ghcr.io/projectnessie/nessie:0.104.5  # <-- Đã thêm ghcr.io/ vào đây
    container_name: demo-nessie
    ports:
      - "19120:19120"
    environment:
      - QUARKUS_PROFILE=prod
      - NESSIE_VERSION_STORE_TYPE=JDBC
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/nessie_db
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=240203
    depends_on:
      - postgres
    networks:
      - lakehouse-network

  # Apache Superset
  superset:
    image: apache/superset:3.1.0
    container_name: demo-superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: university_lakehouse_secret_key
    user: "root"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      sh -c "
      pip install trino sqlalchemy-trino &&
      superset db upgrade &&
      superset fab create-admin
      --username admin
      --firstname Admin
      --lastname User
      --email admin@fab.org
      --password admin &&
      superset init &&
      /usr/bin/run-server.sh
      "
    depends_on:
      - trino
    networks:
      - lakehouse-network

  # Airflow Init
  airflow-init:
    image: apache/airflow:2.9.2-python3.10
    container_name: demo-airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:240203@postgres:5432/airflow_db
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    depends_on:
      - postgres
    networks:
      - lakehouse-network

  # Airflow Webserver
  airflow-webserver:
    image: apache/airflow:2.9.2-python3.10
    container_name: demo-airflow-webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:240203@postgres:5432/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'pyspark==3.5.0 minio python-docx pdfplumber boto3 psycopg2-binary'
    volumes:
      - ./lakehouse/dags:/opt/airflow/dags
      - ./lakehouse/spark:/opt/airflow/spark
    depends_on:
      - postgres
      - airflow-init
    networks:
      - lakehouse-network

  # Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:2.9.2-python3.10
    container_name: demo-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:240203@postgres:5432/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: 'pyspark==3.5.0 minio python-docx pdfplumber boto3 psycopg2-binary'
    volumes:
      - ./lakehouse/dags:/opt/airflow/dags
      - ./lakehouse/spark:/opt/airflow/spark
    depends_on:
      - postgres
      - airflow-init
    networks:
      - lakehouse-network

volumes:
  postgres_data:
  minio_data:
  superset_home:

networks:
  lakehouse-network:
    driver: bridge